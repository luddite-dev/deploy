name: Release Binaries

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compiler (aarch64)
        if: matrix.arch == 'aarch64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build core
        run: cargo build --release --target ${{ matrix.target }} -p komodo_core

      - name: Build periphery
        run: cargo build --release --target ${{ matrix.target }} -p komodo_periphery

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p komodo_cli

      - name: Strip binaries
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            STRIP=aarch64-linux-gnu-strip
          else
            STRIP=strip
          fi
          $STRIP target/${{ matrix.target }}/release/core
          $STRIP target/${{ matrix.target }}/release/periphery
          $STRIP target/${{ matrix.target }}/release/km

      - name: Rename and archive
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/core artifacts/core-${{ matrix.arch }}
          cp target/${{ matrix.target }}/release/periphery artifacts/periphery-${{ matrix.arch }}
          cp target/${{ matrix.target }}/release/km artifacts/km-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.arch }}
          path: artifacts/

  release-alpha:
    name: Update alpha release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Delete existing alpha release
        run: gh release delete alpha --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create alpha release
        run: |
          gh release create alpha \
            --title "Alpha (Latest from main)" \
            --notes "Automated build from commit ${{ github.sha }}" \
            --prerelease \
            --target main \
            artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-stable:
    name: Upload to stable release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload binaries to release
        run: gh release upload ${{ github.ref_name }} artifacts/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
